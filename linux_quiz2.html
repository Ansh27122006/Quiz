<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <title>Shell & SysAdmin Quiz</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Orbitron:wght@700;900&display=swap");

      :root {
        --bg: #0a0d0f;
        --bg2: #0f1316;
        --bg3: #141a1e;
        --green: #00ff88;
        --green2: #00cc6a;
        --amber: #ffb700;
        --red: #ff4060;
        --blue: #00b4ff;
        --text: #c8d8e0;
        --muted: #4a6070;
        --border: #1e2d38;
        --correct: #00ff88;
        --wrong: #ff4060;
        --glow: 0 0 20px rgba(0, 255, 136, 0.3);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Scanline overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.08) 2px,
          rgba(0, 0, 0, 0.08) 4px
        );
        pointer-events: none;
        z-index: 9999;
      }

      /* Grid bg */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: linear-gradient(
            rgba(0, 255, 136, 0.03) 1px,
            transparent 1px
          ),
          linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      #app {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* ── SCREENS ── */
      .screen {
        display: none;
        width: 100%;
        max-width: 860px;
        animation: fadeIn 0.4s ease;
      }
      .screen.active {
        display: block;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── HEADER LOGO ── */
      .logo {
        font-family: "Orbitron", monospace;
        font-size: clamp(1.4rem, 4vw, 2.4rem);
        font-weight: 900;
        color: var(--green);
        text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        text-align: center;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }
      .logo span {
        color: var(--amber);
      }

      .subtitle {
        text-align: center;
        color: var(--muted);
        font-size: 0.75rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 40px;
      }

      /* ── CARDS ── */
      .card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 32px;
        position: relative;
        overflow: hidden;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--green),
          transparent
        );
      }

      /* ── MODE SELECT ── */
      .mode-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 32px;
      }
      @media (max-width: 600px) {
        .mode-grid {
          grid-template-columns: 1fr;
        }
      }

      .mode-btn {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 32px 24px;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        position: relative;
        overflow: hidden;
      }
      .mode-btn::after {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .mode-btn:hover {
        border-color: var(--green);
        transform: translateY(-3px);
        box-shadow: var(--glow);
      }
      .mode-btn .mode-icon {
        font-size: 2.5rem;
        margin-bottom: 16px;
        display: block;
      }
      .mode-btn .mode-name {
        font-family: "Orbitron", monospace;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--green);
        margin-bottom: 8px;
      }
      .mode-btn .mode-desc {
        font-size: 0.72rem;
        color: var(--muted);
        line-height: 1.6;
      }

      /* ── TOPIC FILTER ── */
      .topic-section {
        margin-top: 28px;
      }
      .section-label {
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.15em;
        margin-bottom: 14px;
      }
      .topic-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .topic-chip {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 2px;
        padding: 6px 12px;
        font-size: 0.68rem;
        font-family: "JetBrains Mono", monospace;
        cursor: pointer;
        transition: all 0.15s;
        color: var(--muted);
        user-select: none;
      }
      .topic-chip.selected {
        border-color: var(--green);
        color: var(--green);
        background: rgba(0, 255, 136, 0.06);
      }
      .topic-chip:hover {
        border-color: var(--green2);
        color: var(--text);
      }

      .start-btn {
        display: block;
        width: 100%;
        margin-top: 28px;
        background: linear-gradient(135deg, var(--green2), var(--green));
        color: #000;
        border: none;
        border-radius: 4px;
        padding: 16px;
        font-family: "Orbitron", monospace;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.1em;
        transition: all 0.2s;
      }
      .start-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 24px rgba(0, 255, 136, 0.4);
      }
      .start-btn:disabled {
        background: var(--border);
        color: var(--muted);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      /* ── QUIZ SCREEN ── */
      .quiz-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 12px;
      }

      .mode-badge {
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        padding: 4px 10px;
        border-radius: 2px;
        font-weight: 600;
      }
      .mode-badge.learning {
        background: rgba(0, 180, 255, 0.15);
        color: var(--blue);
        border: 1px solid rgba(0, 180, 255, 0.3);
      }
      .mode-badge.rapidfire {
        background: rgba(255, 183, 0, 0.15);
        color: var(--amber);
        border: 1px solid rgba(255, 183, 0, 0.3);
      }

      .progress-wrap {
        flex: 1;
        margin: 0 16px;
      }
      .progress-bar {
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--green2), var(--green));
        border-radius: 2px;
        transition: width 0.4s ease;
        box-shadow: 0 0 8px rgba(0, 255, 136, 0.5);
      }
      .progress-text {
        font-size: 0.68rem;
        color: var(--muted);
        margin-top: 6px;
        text-align: right;
      }

      .score-display {
        font-size: 0.72rem;
        color: var(--muted);
      }
      .score-display .correct-n {
        color: var(--green);
        font-weight: 700;
      }
      .score-display .wrong-n {
        color: var(--red);
        font-weight: 700;
      }

      /* Question card */
      .q-section-tag {
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--amber);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .q-section-tag::before {
        content: "§";
        opacity: 0.5;
      }

      .q-number {
        font-size: 0.7rem;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .q-text {
        font-size: 1rem;
        line-height: 1.7;
        color: var(--text);
        margin-bottom: 24px;
        font-weight: 400;
      }

      .q-code {
        background: #060809;
        border: 1px solid var(--border);
        border-left: 3px solid var(--green);
        border-radius: 2px;
        padding: 14px 18px;
        font-size: 0.82rem;
        color: var(--green);
        margin: 12px 0 20px;
        white-space: pre-wrap;
        line-height: 1.7;
        overflow-x: auto;
      }

      /* Options */
      .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .opt-btn {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 14px 18px;
        text-align: left;
        cursor: pointer;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.83rem;
        color: var(--text);
        transition: all 0.15s;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        line-height: 1.5;
      }
      .opt-btn:hover:not(:disabled) {
        border-color: var(--green);
        background: rgba(0, 255, 136, 0.04);
        transform: translateX(4px);
      }
      .opt-btn .opt-key {
        min-width: 22px;
        height: 22px;
        border-radius: 2px;
        background: var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.62rem;
        font-weight: 700;
        color: var(--muted);
        flex-shrink: 0;
        margin-top: 1px;
      }
      .opt-btn.correct {
        border-color: var(--correct);
        background: rgba(0, 255, 136, 0.08);
        color: #fff;
      }
      .opt-btn.correct .opt-key {
        background: var(--green);
        color: #000;
      }
      .opt-btn.wrong {
        border-color: var(--wrong);
        background: rgba(255, 64, 96, 0.08);
        color: #fff;
      }
      .opt-btn.wrong .opt-key {
        background: var(--red);
        color: #fff;
      }
      .opt-btn.dimmed {
        opacity: 0.35;
      }
      .opt-btn:disabled {
        cursor: default;
        transform: none !important;
      }

      /* Feedback */
      .feedback-box {
        margin-top: 16px;
        padding: 14px 18px;
        border-radius: 3px;
        font-size: 0.78rem;
        line-height: 1.6;
        display: none;
        animation: fadeIn 0.3s ease;
      }
      .feedback-box.show {
        display: block;
      }
      .feedback-box.correct-fb {
        background: rgba(0, 255, 136, 0.07);
        border: 1px solid rgba(0, 255, 136, 0.3);
        color: var(--green);
      }
      .feedback-box.wrong-fb {
        background: rgba(255, 64, 96, 0.07);
        border: 1px solid rgba(255, 64, 96, 0.3);
        color: var(--red);
      }

      .feedback-explain {
        color: var(--text);
        margin-top: 6px;
        font-size: 0.75rem;
      }

      /* Nav */
      .nav-row {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }

      .nav-btn {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 10px 20px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        color: var(--text);
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.05em;
      }
      .nav-btn:hover:not(:disabled) {
        border-color: var(--green);
        color: var(--green);
      }
      .nav-btn:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .nav-btn.primary {
        background: rgba(0, 255, 136, 0.1);
        border-color: var(--green2);
        color: var(--green);
      }
      .nav-btn.primary:hover:not(:disabled) {
        background: rgba(0, 255, 136, 0.18);
        box-shadow: var(--glow);
      }

      .quit-btn {
        color: var(--muted);
        font-size: 0.7rem;
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        transition: color 0.15s;
      }
      .quit-btn:hover {
        color: var(--red);
      }

      /* Rapid fire indicator */
      .rf-stopped {
        display: none;
        background: rgba(255, 183, 0, 0.1);
        border: 1px solid rgba(255, 183, 0, 0.4);
        border-radius: 3px;
        padding: 12px 16px;
        font-size: 0.75rem;
        color: var(--amber);
        margin-top: 14px;
        text-align: center;
      }
      .rf-stopped.show {
        display: block;
      }

      /* ── RESULT SCREEN ── */
      .result-big {
        text-align: center;
        padding: 32px 0;
      }
      .result-emoji {
        font-size: 4rem;
        margin-bottom: 16px;
      }
      .result-score {
        font-family: "Orbitron", monospace;
        font-size: clamp(2rem, 8vw, 3.5rem);
        font-weight: 900;
        color: var(--green);
        text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        margin-bottom: 8px;
      }
      .result-label {
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin: 28px 0;
      }
      @media (max-width: 500px) {
        .stats-grid {
          grid-template-columns: 1fr;
        }
      }

      .stat-card {
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 20px;
        text-align: center;
      }
      .stat-val {
        font-size: 1.8rem;
        font-weight: 700;
        font-family: "Orbitron", monospace;
      }
      .stat-val.green {
        color: var(--green);
      }
      .stat-val.red {
        color: var(--red);
      }
      .stat-val.blue {
        color: var(--blue);
      }
      .stat-lbl {
        font-size: 0.65rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-top: 4px;
      }

      .result-btns {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 8px;
      }

      .wrong-list {
        margin-top: 24px;
      }
      .wrong-list-title {
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin-bottom: 12px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 8px;
      }
      .wrong-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(30, 45, 56, 0.5);
        font-size: 0.73rem;
      }
      .wrong-item-num {
        color: var(--red);
        font-weight: 700;
        min-width: 28px;
      }
      .wrong-item-q {
        color: var(--muted);
        line-height: 1.4;
      }

      /* Terminal prompt effect */
      .prompt {
        color: var(--green);
      }
      .prompt::before {
        content: "$ ";
        color: var(--muted);
      }

      /* Keyboard hint */
      .kbd-hint {
        font-size: 0.62rem;
        color: var(--muted);
        text-align: center;
        margin-top: 12px;
      }
      .kbd {
        background: var(--border);
        border-radius: 2px;
        padding: 1px 5px;
        font-size: 0.62rem;
      }

      /* Timer bar for rapid fire */
      .rf-timer-bar {
        height: 3px;
        background: var(--border);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 20px;
        display: none;
      }
      .rf-timer-bar.active {
        display: block;
      }
      .rf-timer-fill {
        height: 100%;
        background: var(--amber);
        border-radius: 2px;
        width: 100%;
        transition: width linear;
        box-shadow: 0 0 8px rgba(255, 183, 0, 0.5);
      }

      /* Select all / none */
      .topic-controls {
        display: flex;
        gap: 12px;
        margin-bottom: 10px;
      }
      .topic-ctrl-btn {
        font-size: 0.65rem;
        color: var(--muted);
        background: none;
        border: none;
        cursor: pointer;
        font-family: inherit;
        text-decoration: underline;
        transition: color 0.15s;
      }
      .topic-ctrl-btn:hover {
        color: var(--green);
      }

      /* Streak indicator */
      .streak {
        font-size: 0.65rem;
        color: var(--amber);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!-- ══════════ HOME SCREEN ══════════ -->
      <div
        class="screen active"
        id="screen-home">
        <div class="logo">SHELL<span>&</span>SYS<span>ADMIN</span></div>
        <div class="subtitle">
          Advanced Bash · KVM · Docker · Kubernetes · UFW · AppArmor
        </div>

        <div class="card">
          <div class="section-label">// select mode</div>
          <div class="mode-grid">
            <button
              class="mode-btn"
              onclick="selectMode('learning')">
              <span class="mode-icon">📖</span>
              <div class="mode-name">LEARNING</div>
              <div class="mode-desc">
                See correct/incorrect feedback after each answer. Navigate
                freely with ← → buttons. Review explanations at your own pace.
              </div>
            </button>
            <button
              class="mode-btn"
              onclick="selectMode('rapidfire')">
              <span class="mode-icon">⚡</span>
              <div class="mode-name">RAPID FIRE</div>
              <div class="mode-desc">
                Correct → auto-advance instantly. Wrong → stops, review, then
                continue manually. Tests recall under pressure.
              </div>
            </button>
          </div>

          <div class="topic-section">
            <div class="section-label">
              // filter topics (select all that apply)
            </div>
            <div class="topic-controls">
              <button
                class="topic-ctrl-btn"
                onclick="selectAllTopics()">
                select all
              </button>
              <button
                class="topic-ctrl-btn"
                onclick="clearAllTopics()">
                clear all
              </button>
            </div>
            <div
              class="topic-grid"
              id="topic-chips"></div>
          </div>

          <button
            class="start-btn"
            id="start-btn"
            onclick="startQuiz()"
            disabled>
            ▶ START QUIZ
          </button>
        </div>
      </div>

      <!-- ══════════ QUIZ SCREEN ══════════ -->
      <div
        class="screen"
        id="screen-quiz">
        <div class="quiz-header">
          <span
            class="mode-badge"
            id="mode-badge"
            >LEARNING</span
          >
          <div class="progress-wrap">
            <div class="progress-bar">
              <div
                class="progress-fill"
                id="prog-fill"></div>
            </div>
            <div
              class="progress-text"
              id="prog-text"></div>
          </div>
          <div class="score-display">
            <span
              class="correct-n"
              id="sc-correct"
              >0</span
            >✓ &nbsp;
            <span
              class="wrong-n"
              id="sc-wrong"
              >0</span
            >✗ &nbsp;
            <span
              class="streak"
              id="sc-streak"></span>
          </div>
        </div>

        <div
          class="rf-timer-bar"
          id="rf-timer-bar">
          <div
            class="rf-timer-fill"
            id="rf-timer-fill"></div>
        </div>

        <div class="card">
          <div
            class="q-section-tag"
            id="q-section"></div>
          <div
            class="q-number"
            id="q-number"></div>
          <div
            class="q-text"
            id="q-text"></div>
          <div
            class="q-code"
            id="q-code"
            style="display: none"></div>
          <div
            class="options"
            id="options"></div>
          <div
            class="feedback-box"
            id="feedback-box"></div>
          <div
            class="rf-stopped"
            id="rf-stopped">
            ⚡ WRONG — Review the correct answer above, then press NEXT →
          </div>

          <div class="nav-row">
            <div>
              <button
                class="nav-btn"
                id="btn-prev"
                onclick="navigate(-1)">
                ← PREV
              </button>
            </div>
            <button
              class="quit-btn"
              onclick="confirmQuit()">
              ✕ quit
            </button>
            <div>
              <button
                class="nav-btn primary"
                id="btn-next"
                onclick="navigate(1)">
                NEXT →
              </button>
            </div>
          </div>
          <div
            class="kbd-hint"
            id="kbd-hint">
            Use <span class="kbd">A</span> <span class="kbd">B</span>
            <span class="kbd">C</span> <span class="kbd">D</span> keys to answer
            · <span class="kbd">→</span> Next · <span class="kbd">←</span> Prev
          </div>
        </div>
      </div>

      <!-- ══════════ RESULT SCREEN ══════════ -->
      <div
        class="screen"
        id="screen-result">
        <div
          class="logo"
          style="margin-bottom: 6px">
          RESULT
        </div>
        <div
          class="subtitle"
          id="result-mode-label"></div>

        <div class="card">
          <div class="result-big">
            <div
              class="result-emoji"
              id="result-emoji"></div>
            <div
              class="result-score"
              id="result-score"></div>
            <div class="result-label">SCORE</div>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div
                class="stat-val green"
                id="stat-correct">
                0

          q: "What is the fundamental difference between AppArmor and SELinux?",
          options: [
            "AppArmor is label-based; SELinux is path-based",

            "AppArmor is only for Ubuntu; SELinux is for all Linux",

          explain:
            "AppArmor uses FILE PATHS to define access rules (/etc/nginx/**). SELinux uses LABELS (security contexts) attached to files and processes. AppArmor is simpler to configure; SELinux is more granular.",
        },

        // ─────────── MIXED EXAM TRAPS ───────────
        {

          options: ["$1", "$0", "$SCRIPT", "$NAME"],

          options: [

          ],
          answer: 1,
          explain:
            'When unquoted, both split on whitespace. When quoted: "$@" → each arg separate (safe for spaces). "$*" → all joined by IFS. Always use "$@" when forwarding arguments to preserve filenames with spaces.',
        },
        {
          section: "Exam Traps",
          q: "What does 'docker stop' do compared to 'docker kill'?",
          options: [

            "stop sends SIGTERM (graceful, 10s timeout then SIGKILL); kill sends SIGKILL immediately",

            "kill requires sudo; stop does not",
          ],

          explain:
            "'docker stop' sends SIGTERM first, waits 10 seconds for cleanup, then sends SIGKILL. 'docker kill' sends SIGKILL immediately (or another signal with --signal). Like Linux kill vs kill -9.",

        {

          options: [

          ],
          answer: 1,
          explain:

        },
        {
          section: "Exam Traps",
          q: "After 'unset fruits[1]' on fruits=(apple banana cherry date), what is ${#fruits[@]}?",
          options: ["4", "3", "2", "Error"],
          answer: 1,
          explain:
            "${#fruits[@]} counts only DEFINED elements. After unsetting index 1, there are 3 defined elements (indices 0,2,3). The count is 3, not 4. Indices are NOT re-numbered automatically.",
        },
        {
          section: "Exam Traps",
          q: "Which statement about KVM containers/VMs is TRUE?",
          options: [
            "KVM VMs share the host kernel",

            "LXD containers and Docker containers both have their own kernel",
          ],
          answer: 2,
          explain:
            "KEY DISTINCTION: VMs (KVM) = each has its own kernel, full OS. Docker containers = share the HOST kernel (just isolated processes). LXD system containers also share the host kernel but run a full init system.",
        },
        {
          section: "Exam Traps",
          q: "What is the correct way to capture the exit status of a function BEFORE it gets overwritten?",
          code: "do_work\n# capture $? here before next command overwrites it",
          options: [

            "save_exit && status=$?",
            "status=$(echo $?)",

          answer: 0,

      // ══════════════════════════════════════════════════════════════════
      //  TOPIC LIST
      // ══════════════════════════════════════════════════════════════════
      const TOPICS = [...new Set(ALL_QUESTIONS.map((q) => q.section))];

      // ══════════════════════════════════════════════════════════════════
      //  STATE
      // ══════════════════════════════════════════════════════════════════
      let state = {
        mode: null,
        questions: [],
        current: 0,
        answers: [], // -1=unanswered, index=chosen
        correct: 0,
        wrong: 0,
        streak: 0,
        rfStopped: false,
        selectedTopics: new Set(TOPICS),
        isRetake: false,
        wrongIndices: [],
      };

      // ══════════════════════════════════════════════════════════════════
      //  INIT TOPIC CHIPS
      // ══════════════════════════════════════════════════════════════════
      function initTopicChips() {
        const container = document.getElementById("topic-chips");
        TOPICS.forEach((topic) => {
          const chip = document.createElement("div");
          chip.className = "topic-chip selected";
          chip.textContent = topic;
          chip.dataset.topic = topic;
          chip.onclick = () => toggleTopic(topic, chip);
          container.appendChild(chip);
        });
        updateStartBtn();
      }

      function toggleTopic(topic, el) {
        if (state.selectedTopics.has(topic)) {
          state.selectedTopics.delete(topic);
          el.classList.remove("selected");
        } else {
          state.selectedTopics.add(topic);
          el.classList.add("selected");
        }
        updateStartBtn();
      }

      function selectAllTopics() {
        state.selectedTopics = new Set(TOPICS);
        document
          .querySelectorAll(".topic-chip")
          .forEach((c) => c.classList.add("selected"));
        updateStartBtn();
      }

      function clearAllTopics() {
        state.selectedTopics.clear();
        document
          .querySelectorAll(".topic-chip")
          .forEach((c) => c.classList.remove("selected"));
        updateStartBtn();
      }

      function updateStartBtn() {
        const btn = document.getElementById("start-btn");
        const count = ALL_QUESTIONS.filter((q) =>
          state.selectedTopics.has(q.section)
        ).length;
        btn.disabled = count === 0 || state.mode === null;
        btn.textContent =
          count > 0 ? `▶ START QUIZ  (${count} questions)` : "▶ START QUIZ";
      }

      function selectMode(mode) {
        state.mode = mode;
        document.querySelectorAll(".mode-btn").forEach((b, i) => {
          b.style.borderColor = "";
          b.style.boxShadow = "";
        });
        const idx = mode === "learning" ? 0 : 1;
        const btns = document.querySelectorAll(".mode-btn");
        btns[idx].style.borderColor =
          mode === "learning" ? "var(--blue)" : "var(--amber)";
        btns[idx].style.boxShadow =
          mode === "learning"
            ? "0 0 20px rgba(0,180,255,0.3)"
            : "0 0 20px rgba(255,183,0,0.3)";
        updateStartBtn();
      }

      // ══════════════════════════════════════════════════════════════════
      //  START QUIZ
      // ══════════════════════════════════════════════════════════════════
      function startQuiz(questionsOverride) {
        let qs =
          questionsOverride ||
          ALL_QUESTIONS.filter((q) => state.selectedTopics.has(q.section));
        // Shuffle
        qs = [...qs].sort(() => Math.random() - 0.5);

        state.questions = qs;
        state.current = 0;
        state.answers = new Array(qs.length).fill(-1);
        state.correct = 0;
        state.wrong = 0;
        state.streak = 0;
        state.rfStopped = false;
        state.wrongIndices = [];

        showScreen("screen-quiz");

        const badge = document.getElementById("mode-badge");
        badge.textContent =
          state.mode === "learning" ? "LEARNING MODE" : "RAPID FIRE ⚡";
        badge.className =
          "mode-badge " +
          (state.mode === "learning" ? "learning" : "rapidfire");

        renderQuestion();
        setupKeyboard();
      }

      function retakeAll() {
        startQuiz();
      }

      function retakeWrong() {
        const wrong = state.wrongIndices.map((i) => state.questions[i]);
        if (wrong.length === 0) return;
        state.isRetake = true;
        startQuiz(wrong);
      }

      // ══════════════════════════════════════════════════════════════════
      //  RENDER QUESTION
      // ══════════════════════════════════════════════════════════════════
      function renderQuestion() {
        const q = state.questions[state.current];
        const total = state.questions.length;
        const answered = state.answers[state.current];

        // Progress
        const pct = (state.current / total) * 100;
        document.getElementById("prog-fill").style.width = pct + "%";
        document.getElementById("prog-text").textContent = `Q ${
          state.current + 1
        } of ${total}`;

        // Score
        document.getElementById("sc-correct").textContent = state.correct;
        document.getElementById("sc-wrong").textContent = state.wrong;
        document.getElementById("sc-streak").textContent =
          state.streak > 1 ? `🔥×${state.streak}` : "";

        // Section, number
        document.getElementById("q-section").textContent = q.section;
        document.getElementById("q-number").textContent = `Question ${
          state.current + 1
        }`;

        // Question text
        document.getElementById("q-text").textContent = q.q;

        // Code block
        const codeEl = document.getElementById("q-code");
        if (q.code) {
          codeEl.textContent = q.code;
          codeEl.style.display = "block";
        } else {
          codeEl.style.display = "none";
        }

        // Options
        const optContainer = document.getElementById("options");
        optContainer.innerHTML = "";
        const keys = ["A", "B", "C", "D"];
        q.options.forEach((opt, i) => {
          const btn = document.createElement("button");
          btn.className = "opt-btn";
          btn.innerHTML = `<span class="opt-key">${
            keys[i]
          }</span><span>${escapeHtml(opt)}</span>`;
          btn.disabled = answered !== -1;

          if (answered !== -1) {
            if (i === q.answer) btn.classList.add("correct");
            else if (i === answered && answered !== q.answer)
              btn.classList.add("wrong");
            else btn.classList.add("dimmed");
          } else {
            btn.onclick = () => answerQuestion(i);
          }
          optContainer.appendChild(btn);
        });

        // Feedback
        const fb = document.getElementById("feedback-box");
        const rfStop = document.getElementById("rf-stopped");
        fb.className = "feedback-box";
        fb.style.display = "none";
        rfStop.className = "rf-stopped";

        if (answered !== -1) {
          const isCorrect = answered === q.answer;
          fb.className =
            "feedback-box show " + (isCorrect ? "correct-fb" : "wrong-fb");
          fb.innerHTML =
            (isCorrect
              ? "✓ CORRECT! "
              : `✗ WRONG — Correct: ${keys[q.answer]}. `) +
            `<div class="feedback-explain">${escapeHtml(q.explain)}</div>`;

          if (!isCorrect && state.mode === "rapidfire" && state.rfStopped) {
            rfStop.className = "rf-stopped show";
          }
        }

        // Nav buttons
        document.getElementById("btn-prev").disabled = state.current === 0;
        const nextBtn = document.getElementById("btn-next");
        if (state.current === total - 1) {
          nextBtn.textContent = "FINISH ✓";
        } else {
          nextBtn.textContent = "NEXT →";
        }
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // ══════════════════════════════════════════════════════════════════
      //  ANSWER
      // ══════════════════════════════════════════════════════════════════
      function answerQuestion(chosenIdx) {
        if (state.answers[state.current] !== -1) return;

        const q = state.questions[state.current];
        const isCorrect = chosenIdx === q.answer;
        state.answers[state.current] = chosenIdx;

        if (isCorrect) {
          state.correct++;
          state.streak++;
        } else {
          state.wrong++;
          state.streak = 0;
          state.wrongIndices.push(state.current);
          if (state.mode === "rapidfire") {
            state.rfStopped = true;
          }
        }

        renderQuestion();

        // Rapid fire: auto-advance after short delay if correct
        if (state.mode === "rapidfire" && isCorrect) {
          state.rfStopped = false;
          setTimeout(() => {
            if (state.answers[state.current] !== -1) navigate(1);
          }, 600);
        }
      }

      // ══════════════════════════════════════════════════════════════════
      //  NAVIGATE
      // ══════════════════════════════════════════════════════════════════
      function navigate(dir) {
        const next = state.current + dir;
        if (next < 0) return;
        if (next >= state.questions.length) {
          showResults();
          return;
        }
        state.current = next;
        if (state.mode === "rapidfire") state.rfStopped = false;
        renderQuestion();
      }

      // ══════════════════════════════════════════════════════════════════
      //  RESULTS
      // ══════════════════════════════════════════════════════════════════
      function showResults() {
        const total = state.questions.length;
        const pct = Math.round((state.correct / total) * 100);

        document.getElementById("result-score").textContent = pct + "%";
        document.getElementById("stat-correct").textContent = state.correct;
        document.getElementById("stat-wrong").textContent = state.wrong;
        document.getElementById("stat-total").textContent = total;
        document.getElementById("result-mode-label").textContent =
          state.mode === "learning"
            ? "LEARNING MODE RESULT"
            : "RAPID FIRE RESULT";

        let emoji = "💀";
        if (pct >= 90) emoji = "🏆";
        else if (pct >= 75) emoji = "🎯";
        else if (pct >= 60) emoji = "💪";
        else if (pct >= 40) emoji = "📚";
        document.getElementById("result-emoji").textContent = emoji;

        // Wrong list
        const wrongListEl = document.getElementById("wrong-list");
        wrongListEl.innerHTML = "";
        const btnRetake = document.getElementById("btn-retake-wrong");

        if (state.wrongIndices.length > 0) {
          btnRetake.style.display = "";
          wrongListEl.innerHTML = `<div class="wrong-list-title">✗ Questions you got wrong (${state.wrongIndices.length})</div>`;
          state.wrongIndices.forEach((qi, n) => {
            const q = state.questions[qi];
            const div = document.createElement("div");
            div.className = "wrong-item";
            div.innerHTML = `<span class="wrong-item-num">${
              n + 1
            }.</span><span class="wrong-item-q">${escapeHtml(
              q.q.substring(0, 80)
            )}${q.q.length > 80 ? "..." : ""}</span>`;
            wrongListEl.appendChild(div);
          });
        } else {
          btnRetake.style.display = "none";
          wrongListEl.innerHTML =
            '<div style="text-align:center;color:var(--green);padding:20px;font-size:0.85rem;">🏆 Perfect score! No wrong answers.</div>';
        }

        showScreen("screen-result");
      }

      function confirmQuit() {
        if (confirm("Quit the current quiz?")) {
          showResults();
        }
      }

      function goHome() {
        showScreen("screen-home");
        state.mode = null;
        state.isRetake = false;
        document.querySelectorAll(".mode-btn").forEach((b) => {
          b.style.borderColor = "";
          b.style.boxShadow = "";
        });
        updateStartBtn();
      }

      // ══════════════════════════════════════════════════════════════════
      //  SCREEN SWITCHING
      // ══════════════════════════════════════════════════════════════════
      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      // ══════════════════════════════════════════════════════════════════
      //  KEYBOARD
      // ══════════════════════════════════════════════════════════════════
      function setupKeyboard() {
        document.onkeydown = (e) => {
          if (
            !document.getElementById("screen-quiz").classList.contains("active")
          )
            return;
          const key = e.key.toUpperCase();
          if (["A", "B", "C", "D"].includes(key)) {
            const idx = ["A", "B", "C", "D"].indexOf(key);
            if (state.answers[state.current] === -1) answerQuestion(idx);
          } else if (e.key === "ArrowRight" || e.key === "Enter") {
            navigate(1);
          } else if (e.key === "ArrowLeft") {
            navigate(-1);
          }
        };
      }

      // ══════════════════════════════════════════════════════════════════
      //  BOOT
      // ══════════════════════════════════════════════════════════════════
      initTopicChips();
    </script>
  </body>
</html>
